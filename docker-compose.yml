version: '3.9'

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cloudpipeline-server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
    volumes:
      - ./server/src:/app/src   # hot-reload in dev
    networks:
      - cloudpipeline-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend ─────────────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: cloudpipeline-client
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - cloudpipeline-net

networks:
  cloudpipeline-net:
    driver: bridge
