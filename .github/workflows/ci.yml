name: CI — Lint, Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint & Test Backend ──────────────────────────────────────────────
  server-ci:
    name: Server — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests with coverage
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: server/coverage/

  # ── Job 2: Lint & Test Frontend ─────────────────────────────────────────────
  client-ci:
    name: Client — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run React tests
        run: npm test

  # ── Job 3: Docker Build & Push (only on main after tests pass) ──────────────
  docker-build:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [server-ci, client-ci]          # only runs if both test jobs pass
    if: github.ref == 'refs/heads/main'    # only on main branch merges

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cloudpipeline-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cloudpipeline-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          build-args: |
            REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cloudpipeline-client:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cloudpipeline-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tags
        run: |
          echo "Server image: ${{ secrets.DOCKERHUB_USERNAME }}/cloudpipeline-server:${{ github.sha }}"
          echo "Client image: ${{ secrets.DOCKERHUB_USERNAME }}/cloudpipeline-client:${{ github.sha }}"
